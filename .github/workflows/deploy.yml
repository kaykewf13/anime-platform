name: 🚀 Deploy Anime Platform

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🔍 Debug estrutura
      run: |
        echo "📂 Estrutura atual:"
        ls -R

    - name: 🧱 Criar frontend automático (se não existir)
      run: |
        mkdir -p platform/web

        if [ ! -f "platform/web/index.html" ]; then
          echo "⚡ Criando frontend automático..."

          cat > platform/web/index.html << 'EOF'
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Anime Platform</title>
  <style>
    body { background:#0b0b0b; color:white; font-family:Arial; text-align:center; padding:50px; }
    h1 { color:red; }
  </style>
</head>
<body>
  <h1>🔥 Anime Platform Online</h1>
  <p>Deploy funcionando com sucesso 🚀</p>
</body>
</html>
EOF

        fi

    - name: 🌐 Deploy GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./platform/web
        publish_branch: gh-pages
        force_orphan: true