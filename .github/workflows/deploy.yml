name: 🚀 Deploy Anime Platform

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: 🔍 Verificar estrutura
      run: |
        echo "📂 Estrutura do projeto:"
        ls -R

    - name: ⚙️ Instalar dependências API (se existir)
      run: |
        if [ -d "platform/api" ]; then
          cd platform/api
          pip install -r requirements.txt
        else
          echo "⚠️ Pasta platform/api não encontrada"
        fi

    - name: 🧪 Testar API (se existir)
      run: |
        if [ -f "platform/api/app.py" ]; then
          cd platform/api
          uvicorn app:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -f http://localhost:8000/ || exit 1
        else
          echo "⚠️ API não encontrada"
        fi

     - name: 🌐 Deploy GitHub Pages
  uses: peaceiris/actions-gh-pages@v3
  with:
    github_token: ${{ secrets.GITHUB_TOKEN }}
    publish_dir: ./platform/web
    force_orphan: true